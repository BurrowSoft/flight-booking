<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="FlyMole mascot">
  <g id="mole-base" fill="white" stroke="#1e2d3d" stroke-linecap="round" stroke-linejoin="round">
    <!-- Crown puffs -->
    <circle cx="91" cy="28" r="5" stroke-width="2.5"/>
    <circle cx="100" cy="22" r="6" stroke-width="2.5"/>
    <circle cx="109" cy="28" r="5" stroke-width="2.5"/>
    <!-- Head -->
    <circle cx="100" cy="83" r="57" stroke-width="3.5"/>
    <!-- Left lens -->
    <circle cx="81" cy="89" r="19" stroke-width="4"/>
    <!-- Right lens -->
    <circle cx="119" cy="89" r="19" stroke-width="4"/>
    <!-- Bridge -->
    <line x1="100" y1="87" x2="100" y2="92" stroke-width="3"/>
    <!-- Temple arms -->
    <line x1="62" y1="89" x2="55" y2="89" stroke-width="3"/>
    <line x1="138" y1="89" x2="145" y2="89" stroke-width="3"/>
    <!-- Left pupil -->
    <circle cx="81" cy="89" r="9" fill="#1e2d3d" stroke="none"/>
    <circle cx="84" cy="86" r="3.5" fill="white" stroke="none"/>
    <!-- Right pupil -->
    <circle cx="119" cy="89" r="9" fill="#1e2d3d" stroke="none"/>
    <circle cx="122" cy="86" r="3.5" fill="white" stroke="none"/>
    <!-- Nose -->
    <ellipse cx="100" cy="113" rx="6" ry="4.5" fill="#1e2d3d" stroke="none"/>
    <!-- Ledge -->
    <rect x="20" y="130" width="160" height="18" rx="7" stroke-width="3.5"/>
    <!-- Left paw -->
    <ellipse cx="62" cy="130" rx="20" ry="11" stroke-width="3"/>
    <path d="M49,126 Q55,119 62,122 Q69,119 75,126" fill="none" stroke-width="2"/>
    <!-- Right paw -->
    <ellipse cx="138" cy="130" rx="20" ry="11" stroke-width="3"/>
    <path d="M125,126 Q131,119 138,122 Q145,119 151,126" fill="none" stroke-width="2"/>
  </g>

  <g id="prop" fill="white" stroke="#1e2d3d" stroke-linecap="round" stroke-linejoin="round">
    <!-- Airplane — top-down view, pointing upward -->
    <!-- Fuselage -->
    <ellipse cx="100" cy="183" rx="11" ry="26" stroke-width="2.5"/>
    <!-- Cockpit dome -->
    <ellipse cx="100" cy="160" rx="7" ry="8" fill="#cce8ff" stroke-width="2"/>
    <!-- Left main wing -->
    <polygon points="95,178 55,192 60,198 100,185" stroke-width="2"/>
    <!-- Right main wing -->
    <polygon points="105,178 145,192 140,198 100,185" stroke-width="2"/>
    <!-- Left tail stabiliser -->
    <polygon points="95,205 80,214 84,207 95,207" stroke-width="1.5"/>
    <!-- Right tail stabiliser -->
    <polygon points="105,205 120,214 116,207 105,207" stroke-width="1.5"/>
  </g>
</svg>
